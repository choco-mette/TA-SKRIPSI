{% extends "layouts/base.html" %}

{% block title %}Dashboard - Mental Health Chatbot{% endblock %}

{% block content %}
<!-- Check Auth Script -->
<script>
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login';
    }
</script>

<div class="drawer lg:drawer-open h-full">
  <input id="my-drawer-2" type="checkbox" class="drawer-toggle" />
  
  <!-- Main Content (Chat Interface) -->
  <div class="drawer-content flex flex-col bg-base-100 h-full overflow-hidden relative">
    
    <!-- Top Bar for Mobile -->
    <div class="w-full navbar bg-base-100 lg:hidden border-b border-base-200 shrink-0">
        <label for="my-drawer-2" class="btn btn-square btn-ghost drawer-button">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-6 h-6 stroke-current"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </label>
        <div class="flex-1 px-2 mx-2 font-bold text-lg">Wellness Assistant</div>
    </div>

    <!-- Chat Messages Area -->
    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 scroll-smooth w-full">
        <!-- Default Welcome State -->
        <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-base-content/50">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-24 h-24 mb-4 opacity-20">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.159 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
            </svg>
            <p class="text-lg font-medium">Start a conversation</p>
            <p class="text-sm">Your safe space to talk.</p>
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-4 bg-base-100 border-t border-base-200 shrink-0 w-full z-30">
        <form id="chat-form" class="flex gap-2 max-w-4xl mx-auto" onsubmit="sendMessage(event)">
            <input type="text" id="message-input" class="input input-bordered flex-1 focus:outline-none" placeholder="Type your message..." autocomplete="off" disabled />
            <button type="submit" id="send-btn" class="btn btn-primary" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                </svg>
            </button>
        </form>
    </div>
  </div> 

  <!-- Sidebar -->
  <div class="drawer-side border-r border-base-200 z-20">
    <label for="my-drawer-2" class="drawer-overlay"></label> 
    <div class="flex flex-col w-80 h-full bg-base-200 text-base-content">
        <!-- Sidebar Header -->
        <div class="p-4 mb-2">
            <h1 class="text-xl font-bold px-2 mb-4 hidden lg:block">Wellness AI</h1>
            <button onclick="startNewChat()" class="btn btn-primary w-full gap-2 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                New Chat
            </button>
        </div>

        <!-- History List -->
        <div class="flex-1 overflow-y-auto px-2 space-y-1" id="conversation-list">
            <!-- Items injected by JS -->
            <div class="text-center p-4 opacity-50 text-sm">Loading history...</div>
        </div>

        <!-- Sidebar Footer (User Profile) -->
        <div class="p-4 border-t border-base-300">
             <div class="dropdown dropdown-top w-full">
                <label tabindex="0" class="btn btn-ghost w-full justify-start gap-3 px-2 no-animation">
                    <div class="avatar" id="sidebar-user-avatar">
                         <!-- Dynamically populated or fallback -->
                        <div class="w-8 rounded-full">
                           <img src="https://ui-avatars.com/api/?name=U" />
                        </div>
                    </div>
                    <div class="flex flex-col items-start truncate overflow-hidden">
                        <span class="text-sm font-bold truncate w-full text-left" id="user-name">User</span>
                        <span class="text-xs opacity-60">View Settings</span>
                    </div>
                </label>
                <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow bg-base-100 rounded-box w-52 mb-2">
                    <li id="admin-link-li" class="hidden"><a href="/admin">Admin Panel</a></li>
                    <li><a onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </div>
  </div>
</div>

<script src="/static/js/utils/http.js"></script>
<script src="/static/js/chat.js?v=2"></script>
{% endblock %}
