{% extends "layouts/base.html" %}

{% block title %}Login - Mental Health Chatbot{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-4rem)]">
    <div class="card w-96 bg-base-100 shadow-xl border border-base-200">
        <div class="card-body">
            <h2 class="card-title justify-center text-2xl font-bold mb-4 text-primary">Welcome Back</h2>
            <p class="text-center text-sm text-base-content/70 mb-4">Please login to your account</p>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-control w-full">
                    <label class="label">
                        <span class="label-text">Email</span>
                    </label>
                    <input type="email" id="email" placeholder="name@example.com" class="input input-bordered w-full" required />
                </div>
                
                <div class="form-control w-full mt-2">
                    <label class="label">
                        <span class="label-text">Password</span>
                    </label>
                    <input type="password" id="password" placeholder="Enter password" class="input input-bordered w-full" required />
                </div>
                
                <div class="card-actions justify-center mt-6">
                    <button type="submit" class="btn btn-primary w-full" id="loginBtn">
                        Login
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="/static/js/utils/http.js"></script>
<script src="/static/js/login.js"></script>
{% endblock %}
