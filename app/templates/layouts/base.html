<!DOCTYPE html>
<html lang="id" data-theme="emerald">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mental Health AI{% endblock %}</title>
    
    <!-- TailwindCSS & DaisyUI via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

    <!-- Custom Font: Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0fdf4; /* Very light green bg override */
        }
        .chat-bubble-user {
            background-color: #65a382;
            color: white;
        }
        .chat-bubble-ai {
            background-color: #f3f4f6;
            color: #374151;
        }

        /* Fix SweetAlert2 Buttons Visibility vs Tailwind Preflight */
        .swal2-styled.swal2-confirm {
            background-color: #d33 !important;
            color: white !important;
        }
        .swal2-styled.swal2-cancel {
            background-color: #6e7881 !important;
            color: white !important;
        }
        .swal2-styled:hover {
            opacity: 0.9 !important;
        }

        /* Typography fixes for chat bubbles */
        .chat-bubble.prose {
            color: inherit;
            max-width: none;
        }
        .chat-bubble.prose p {
            margin-top: 0.5em;
            margin-bottom: 0.5em;
        }
        .chat-bubble.prose ul, .chat-bubble.prose ol {
            margin-top: 0.5em;
            margin-bottom: 0.5em;
            padding-left: 1.5em;
            list-style-type: disc;
        }
        .chat-bubble.prose ol {
            list-style-type: decimal;
        }
        .chat-bubble.prose h1, .chat-bubble.prose h2, .chat-bubble.prose h3 {
            margin-top: 1em;
            margin-bottom: 0.5em;
            font-size: 1.1em;
            font-weight: 600;
        }
        .chat-bubble.prose :first-child {
            margin-top: 0;
        }
        .chat-bubble.prose :last-child {
            margin-bottom: 0;
        }
        .chat-bubble.prose a {
            color: #2563eb;
            text-decoration: underline;
        }
        .chat-bubble.prose pre {
            background-color: #1f2937;
            color: #e5e7eb;
            padding: 0.5em;
            border-radius: 0.375rem;
            margin-top: 0.5em;
            margin-bottom: 0.5em;
            overflow-x: auto;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="h-dvh overflow-hidden flex flex-col">

    <!-- Main Content -->
    <main class="flex-grow flex flex-col h-full overflow-hidden">
        {% block content %}
        {% endblock %}
    </main>


    <!-- Global Scripts -->
    <script>
        // SweetAlert2 Toast Notification Helper
        function showToast(message, type = 'info') {
            const Toast = Swal.mixin({
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 3000,
                timerProgressBar: true,
                didOpen: (toast) => {
                    toast.addEventListener('mouseenter', Swal.stopTimer)
                    toast.addEventListener('mouseleave', Swal.resumeTimer)
                }
            });

            Toast.fire({
                icon: type,
                title: message
            });
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
