<!DOCTYPE html>
<html lang="id" data-theme="emerald">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mental Health AI{% endblock %}</title>
    
    <!-- TailwindCSS & DaisyUI via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Font: Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0fdf4; /* Very light green bg override */
        }
        .chat-bubble-user {
            background-color: #65a382;
            color: white;
        }
        .chat-bubble-ai {
            background-color: #f3f4f6;
            color: #374151;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- Flash Messages (Toast) -->
    <div id="toast-container" class="toast toast-top toast-end z-50">
        <!-- Javascript will inject toasts here -->
    </div>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col h-full overflow-hidden">
        {% block content %}
        {% endblock %}
    </main>


    <!-- Global Scripts -->
    <script>
        // Simple Toast Notification Helper
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let alertClass = 'alert-info';
            if (type === 'success') alertClass = 'alert-success';
            if (type === 'error') alertClass = 'alert-error';
            if (type === 'warning') alertClass = 'alert-warning';

            toast.className = `alert ${alertClass} shadow-lg mb-2`;
            toast.innerHTML = `<span>${message}</span>`;
            
            container.appendChild(toast);
            
            // Auto remove after 3 seconds
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
